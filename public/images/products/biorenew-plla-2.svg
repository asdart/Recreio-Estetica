<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <rect width="600" height="800" fill="#D6CEC4" rx="8"/>
  <g transform="translate(300, 370)" fill="none" stroke="#A89E94" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bottle body -->
    <rect x="-55" y="-120" width="110" height="240" rx="12" fill="#C4BAB0" stroke="#A89E94"/>
    <!-- Bottle neck -->
    <rect x="-22" y="-170" width="44" height="55" rx="6" fill="#C4BAB0" stroke="#A89E94"/>
    <!-- Bottle cap -->
    <rect x="-28" y="-200" width="56" height="35" rx="8" fill="#B8AEA3" stroke="#A89E94"/>
    <!-- Label area -->
    <rect x="-40" y="-60" width="80" height="100" rx="4" fill="#E8E2DC" stroke="#BEB4A9"/>
    <!-- Label lines -->
    <line x1="-25" y1="-35" x2="25" y2="-35" stroke="#C4BAB0" stroke-width="2"/>
    <line x1="-20" y1="-20" x2="20" y2="-20" stroke="#C4BAB0" stroke-width="2"/>
    <line x1="-22" y1="-5" x2="22" y2="-5" stroke="#C4BAB0" stroke-width="2"/>
    <!-- Highlight -->
    <line x1="-45" y1="-100" x2="-45" y2="80" stroke="#DDD6CE" stroke-width="3" opacity="0.6"/>
  </g>
  <text x="300" y="680" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#A89E94" letter-spacing="0.1em">RECREIO ESTÉTICA</text>
</svg>
