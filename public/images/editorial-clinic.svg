<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#D6CEC4" rx="8"/>
  <g transform="translate(400, 260)" fill="none" stroke="#A89E94" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Clinic building -->
    <rect x="-100" y="-80" width="200" height="140" rx="4" fill="#C4BAB0"/>
