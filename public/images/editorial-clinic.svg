    <line x1="-7" y1="-62" x2="7" y2="-62"/>
  </g>
  <text x="400" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#A89E94" letter-spacing="0.1em">RECREIO ESTÉTICA</text>
